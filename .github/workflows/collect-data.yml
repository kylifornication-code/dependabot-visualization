name: Collect Dependabot Data

# ── Setup instructions ──────────────────────────────────────────────────────
#
# 1. Create a Personal Access Token at https://github.com/settings/tokens
#    Required scopes:
#      - repo          (read repo metadata and PRs)
#      - security_events  (read Dependabot alerts)
#      - read:org      (if you want to scan organization repos)
#
# 2. Add it as a repository secret named GH_TOKEN
#    Settings → Secrets and variables → Actions → New repository secret
#
# 3. Enable GitHub Pages for this repo:
#    Settings → Pages → Source: Deploy from branch → Branch: main, /docs
#
# 4. (Optional) Set GITHUB_ORG secret/var if you want org-level alert scanning
#    (faster and covers org repos your token might not list individually)
#
# ───────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      org:
        description: 'GitHub org to scan (overrides GITHUB_ORG secret)'
        required: false

permissions:
  contents: write   # needed to commit data files back to the repo

jobs:
  collect:
    name: Collect & commit data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect Dependabot data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Prefer manual input, fall back to org secret/variable
          GITHUB_ORG: ${{ inputs.org || vars.GITHUB_ORG || secrets.GITHUB_ORG || '' }}
        run: node scripts/collect.mjs

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore: dependabot snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
